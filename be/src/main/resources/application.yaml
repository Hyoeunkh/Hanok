  secret: ${JWT_SECRET:my-super-secret-key-for-local-development-must-be-long-enough-12345}
  expiration: 3600000
  refresh-expiration: 1209600000

  # Swagger 설정
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      tags-sorter: alpha
      operations-sorter: alpha
    api-docs:
      path: /v3/api-docs

